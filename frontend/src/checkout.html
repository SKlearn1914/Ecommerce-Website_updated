<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<link rel="stylesheet" href="../css/style_checkout.css">

<body>
    <header>
        <h1><a href="/" style="color:white;text-decoration:none;"><img src="../img/logo.png" width="80"
                    alt=""></a></h1>
        <nav>
            <a href="/product">Products</a>
            <a href="/cart">Cart</a>
            <a href="/login">Login</a>
        </nav>
    </header>

    <div class="box">
        <h2>Payment Details</h2>

        <!-- Payment Icons -->
        <div class="payment-icons">
            <img src="https://img.icons8.com/color/48/visa.png">
            <img src="https://img.icons8.com/color/48/mastercard.png">
            <img src="https://img.icons8.com/color/48/amex.png">
        </div>

        <!-- Full Name -->
        <input style="width: 95%;" type="text" id="name" placeholder="Full Name" required>

        <!-- Card Number -->
        <input style="width: 95%;" type="text" id="cardNumber" placeholder="Card Number" maxlength="19" required>

        <!-- Expiry + CVV -->
        <div class="row">
            <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
            <input type="password" id="cvv" placeholder="CVV" maxlength="3" required>
        </div>

        <!-- Payment Method -->
        <select id="paymentMethod">
            <option value="cod">Cash on Delivery</option>
            <option value="credit">Credit Card</option>
            <option value="debit">Debit Card</option>
        </select>

        <button onclick="placeOrder()">Place Order</button>

        <p class="small-text">🔒 Secure Payment</p>
    </div>
    <footer>
        <div class="footer-container">
            <div>
                <h4>About Us</h4>
                <p>We provide best products at affordable prices.</p>
            </div>
            <div>
                <h4>Quick Links</h4>
                <a href="/">Home</a>
                <a href="/product">Shop</a>
                <a href="/contact">Contact</a>
            </div>
            <div>
                <h4>Support</h4>
                <a href="/faq">FAQ</a>
                <a href="https://www.google.com">Help Center</a>
            </div>
        </div>
        <div class="copyright">
            © 2026 All Rights Reserved | Developed By SK
        </div>
    </footer>

    <script src="../js/script_checkout.js"></script>
</body>

</html>
