<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - SK-Shop</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style_product.css">
</head>

<body>
  <!-- Header -->
  <header>
    <h1><a href="/"><img src="../img/logo.png" width="80" alt="SK-Shop"></a></h1>
    <nav>
      <a href="/product">Products</a>
      <a href="/cart">Cart</a>
      <a href="/login">Login</a>
    </nav>
  </header>

  <!-- Filter Section -->
  <div class="filter">
    <input type="text" id="search" placeholder="Search product...">

    <select id="categoryFilter">
      <option value="all">All Categories</option>
      <option value="Electronic">Electronic</option>
      <option value="Clothing">Clothing</option>
      <option value="Accessory">Accessory</option>
    </select>

    <select id="priceFilter">
      <option value="all">All Prices</option>
      <option value="low">Below $50</option>
      <option value="high">Above $50</option>
    </select>

    <select id="ratingFilter">
      <option value="all">All Ratings</option>
      <option value="1">⭐</option>
      <option value="2">⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="5">⭐⭐⭐⭐⭐</option>
    </select>

    <select id="quantityFilter">
      <option value="all">All Quantities</option>
      <option value="low">&lessdot; 500 bought</option>
      <option value="high">&gtrdot;500 bought</option>
    </select>
  </div>
  <!-- Product Section -->
  <div class="product-container" id="product-container">
    <!-- Products will be dynamically inserted here -->
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <div>
        <h4>About Us</h4>
        <p>We provide best products at affordable prices.</p>
      </div>
      <div>
        <h4>Quick Links</h4>
        <a href="/">Home</a>
        <a href="/product">Shop</a>
        <a href="/contact">Contact</a>
      </div>
      <div>
        <h4>Support</h4>
        <a href="/faq">FAQ</a>
        <a href="https://www.google.com">Help Center</a>
      </div>
    </div>
    <div class="copyright">
      © 2026 All Rights Reserved | Developed By SK
    </div>
  </footer>

  <!-- JS -->
  <script src="../js/script_product.js"></script>
</body>

</html>
